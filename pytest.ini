[pytest]
# ---------------------------------------------------------------------------
# Discovery
# ---------------------------------------------------------------------------
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ---------------------------------------------------------------------------
# Default invocation flags
# ---------------------------------------------------------------------------
# -ra                     : show extra summary info for all non-passing tests
# --strict-markers        : fail on undeclared markers (forces good hygiene)
# --tb=short              : concise tracebacks
# --html / --self-contained-html : generate a portable HTML report
# --junitxml              : emit JUnit XML for CI dashboards
# --timeout               : cap any single test at 60 seconds
addopts =
    -ra
    --strict-markers
    --tb=short
    --html=reports/report.html
    --self-contained-html
    --junitxml=reports/junit.xml
    --timeout=60

# ---------------------------------------------------------------------------
# Custom markers — keep this list in sync with what tests actually use.
# Run a single category with:  pytest -m smoke
# ---------------------------------------------------------------------------
markers =
    smoke: fast sanity checks that must pass before deeper testing
    functional: core arithmetic / digit / decimal behaviour
    scientific: trigonometric, square-root and logarithm operations
    edge: boundary, error and edge-case scenarios
    ux: user-experience, keyboard and accessibility checks
    bug: scenario that demonstrates a known defect (xfail expected)
    regression: full regression suite (everything except smoke-only)

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
