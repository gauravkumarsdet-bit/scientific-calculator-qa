# Tooling configuration for code formatters / import sorters.
# pytest config lives in pytest.ini; flake8 config lives in .flake8
# (flake8 still does not natively support pyproject.toml).

[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312"]
include = '\.pyi?$'
extend-exclude = '''
/(
    \.git
  | \.venv
  | venv
  | build
  | dist
  | reports
)/
'''

[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["src", "tests"]
skip = ["venv", ".venv", "build", "dist", "reports"]
